<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <!-- Concept C: minimalist, transparent-friendly. Corner brackets + thin baseline only, ~97% free -->
  <rect width="1920" height="1080" fill="#fbfaf8"/>
  <!-- corner brackets only -->
  <g stroke="#D97757" stroke-width="5" stroke-linecap="round" fill="none">
    <path d="M40 90 V40 H90"/>
    <path d="M1830 40 H1880 V90"/>
    <path d="M40 990 V1040 H90"/>
    <path d="M1830 1040 H1880 V990"/>
  </g>
  <!-- thin baseline rule, anchors the "board" feel -->
  <line x1="90" y1="1040" x2="1830" y2="1040" stroke="#e2ded6" stroke-width="2"/>
</svg>
